<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- title dikosongkan -->
<title></title>

<style>

/* BACKGROUND CREAM */

body {
    margin: 0;
    height: 100vh;

    background-color: #F2E3C6;

    display: flex;
    justify-content: center;
    align-items: center;

    font-family: 'Aptos Display', sans-serif;
}

/* CONTAINER */

.container {
    text-align: center;
}

/* TEXT HI ANDRI */

.title {

    font-family: 'Aptos', sans-serif;
    font-weight: 800;

    font-size: 34px;

    margin-bottom: 50px;

    color: #7A4E2D; /* warna boba */
}

/* ICON BUKU */

.book img {

    width: 170px;

    margin-bottom: 50px;
}

/* BUBBLE OVAL */

.open-btn {

    font-family: 'Aptos Display', sans-serif;

    font-size: 15px;

    padding: 16px 55px;

    border-radius: 50px;

    border: none;

    background-color: #7A4E2D;

    color: #F2E3C6;

    box-shadow: 0 6px 18px rgba(0,0,0,0.15);

    cursor: pointer;

    letter-spacing: 2px;
}

.open-btn:hover {
    transform: scale(1.05);
}

</style>

</head>

<body>

<div class="container">

<div class="title">
Hi, Andri
</div>

<div class="book">
<img src="book.png">
</div>

<button class="open-btn">
OPEN STORY BOOK
</button>

</div>

</body>
</html>
