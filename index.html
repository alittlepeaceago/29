<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title></title>

<style>

/* BACKGROUND LUAR */

body {

margin: 0;
height: 100vh;

background-color: #EAD7B7;

display: flex;
justify-content: center;
align-items: center;

font-family: 'Aptos Display', sans-serif;

}

/* FRAME */

.frame {

width: 92%;
height: 92%;

background-color: #F6E7CC;

border: 7px solid #7A4E2D;

border-radius: 28px;

display: flex;
justify-content: center;
align-items: center;

box-shadow: 0 12px 30px rgba(0,0,0,0.18);

}

/* ISI */

.container {

text-align: center;

}

/* HI ANDRI — DIBESARKAN */

.title {

font-family: 'Aptos', sans-serif;
font-weight: 800;

font-size: 42px;  /* sebelumnya 34px */

margin-bottom: 60px;

color: #7A4E2D;

}

/* BOOK — DIBESARKAN */

.book img {

width: 230px;  /* sebelumnya 170px */

margin-bottom: 60px;

}

/* BUBBLE — DIBESARKAN */

.open-btn {

font-family: 'Aptos Display', sans-serif;

font-size: 18px;  /* sebelumnya 15px */

padding: 20px 70px;  /* bubble lebih gede */

border-radius: 60px;

border: none;

background-color: #7A4E2D;

color: #F2E3C6;

box-shadow: 0 6px 18px rgba(0,0,0,0.15);

cursor: pointer;

letter-spacing: 2px;

}

.open-btn:hover {

transform: scale(1.05);

}

</style>

</head>

<body>

<div class="frame">

<div class="container">

<div class="title">
Hi, Andri
</div>

<div class="book">
<img src="book.png">
</div>

<button class="open-btn">
OPEN STORY BOOK
</button>

</div>

</div>

</body>
</html>
