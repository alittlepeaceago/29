<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title></title>

<style>

/* BACKGROUND PUTIH */

body {
margin: 0;
height: 100vh;

background-color: white;

display: flex;
flex-direction: column;
justify-content: space-between;
align-items: center;

font-family: sans-serif;
}

/* ===== TANGGAL ===== */

.date-box {

text-align: center;

margin-top: 30px;

color: #7A4E2D;
}

.day {

font-size: 28px;

font-weight: bold;
}

.full-date {

font-size: 16px;

margin-top: 5px;
}

/* ===== FRAME ===== */

.main-frame {

background-color: #F6E7CC;

width: 85%;

padding: 30px;

border-radius: 25px;

text-align: center;

box-shadow: 0 8px 20px rgba(0,0,0,0.12);
}

/* HI ANDRI */

.title {

font-size: 40px;

color: #7A4E2D;

margin-bottom: 30px;
}

/* BOOK */

.book img {

width: 260px; /* DIKECILIN DIKIT BIAR GA NUTUP */

margin-bottom: 30px;
}

/* BUBBLE */

.open-btn {

font-size: 18px;

padding: 18px 60px;

border-radius: 60px;

border: none;

background-color: #7A4E2D;

color: #F2E3C6;

cursor: pointer;

letter-spacing: 2px;
}

/* MUSIC PLAYER */

.music-player {

background-color: #7A4E2D;

width: 90%;

padding: 15px 20px;

border-radius: 20px;

margin-bottom: 25px;

display: flex;

align-items: center;

justify-content: space-between;

color: #F2E3C6;
}

/* ICON MUTER */

.spin {

width: 26px;
height: 26px;

border-radius: 50%;

background-color: #F2E3C6;

animation: spin 4s linear infinite;
}

@keyframes spin {

0% { transform: rotate(0deg); }

100% { transform: rotate(360deg); }

}

</style>

</head>

<body>

<!-- AUDIO -->

<audio autoplay loop>
<source src="about-you.mp3" type="audio/mpeg">
</audio>

<!-- TANGGAL -->

<div class="date-box">

<div class="day" id="day"></div>

<div class="full-date" id="date"></div>

</div>

<!-- FRAME -->

<div class="main-frame">

<div class="title">
Hi, Andri
</div>

<div class="book">
<img src="book.png">
</div>

<button class="open-btn">
OPEN STORY BOOK
</button>

</div>

<!-- MUSIC -->

<div class="music-player">

<div>
About You — The 1975
</div>

<div class="spin"></div>

</div>

<script>

/* DATE */

var today = new Date();

var dayName = today.toLocaleDateString('en-US', {
weekday: 'long'
});

var fullDate = today.toLocaleDateString('en-US', {
day: 'numeric',
month: 'long',
year: 'numeric'
});

document.getElementById("day").innerHTML = dayName;

document.getElementById("date").innerHTML = fullDate;

</script>

</body>
</html>
